<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>아크노바 점수판 (1:1) · 가로모드</title>
<meta name="theme-color" content="#0e2722">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="아크노바 점수판">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="icon-180.png">
<style>
  :root{
    --bg:#0e2722; --panel:#123a31; --panel2:#0f322a;
    --line:#1f5546; --txt:#eaf6f1; --muted:#9fc7ba;
    --p1:#e8842b; --p2:#28c0c9; --minus:#c0463f;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%;}
  body{
    background:var(--bg); color:var(--txt);
    font-family:"Malgun Gothic","맑은 고딕","Apple SD Gothic Neo",sans-serif;
    display:flex; flex-direction:column;
    height:100vh; height:100dvh; overflow:hidden;
  }

  header{
    display:flex; align-items:center; justify-content:center; gap:14px;
    padding:calc(4px + env(safe-area-inset-top)) 14px 4px;
    background:linear-gradient(#15463a,#0e2c25);
    border-bottom:2px solid var(--line); position:relative; flex:none;
  }
  header h1{font-size:17px; margin:0; letter-spacing:.5px;}
  header .tools{position:absolute; right:12px; top:50%; transform:translateY(-50%); display:flex; gap:6px;}
  header button{
    background:#1c4f42; color:var(--txt); border:1px solid var(--line);
    padding:6px 11px; border-radius:8px; cursor:pointer; font-size:13px;
  }
  header button:hover{background:#256356;}
  header button.on{background:var(--p1); border-color:var(--p1); color:#1a1208; font-weight:700;}

  .board{flex:1; display:flex; min-height:0;}
  .col{
    flex:1 1 50%; min-width:0; min-height:0; position:relative; overflow:hidden;
    padding:8px 12px;
  }
  .col.p1{background:var(--panel); padding-left:calc(12px + env(safe-area-inset-left));}
  .col.p2{background:var(--panel2); border-left:3px solid var(--line); padding-right:calc(12px + env(safe-area-inset-right));}
  .fit{transform-origin:top left; width:100%;}

  .name-row{display:flex; align-items:center; gap:10px; margin-bottom:6px;}
  .accent{width:10px; height:34px; border-radius:4px; flex:none;}
  .p1 .accent{background:var(--p1);} .p2 .accent{background:var(--p2);}
  .pname{
    font-size:22px; font-weight:700; flex:1; background:transparent;
    border:none; border-bottom:2px dashed transparent; color:var(--txt);
    outline:none; padding:2px 4px; min-width:0;
  }
  .pname:focus{border-bottom-color:var(--muted);}
  .grand{font-size:12px; color:var(--muted); text-align:right; white-space:nowrap; line-height:1;}
  .grand b{font-size:30px; display:block; line-height:1;}
  .p1 .grand b{color:var(--p1);} .p2 .grand b{color:var(--p2);}

  .section{
    background:rgba(255,255,255,.03); border:1px solid var(--line);
    border-radius:11px; padding:7px 9px; margin-bottom:8px;
  }
  .sec-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:5px;}
  .sec-title{font-size:13px; font-weight:700; color:var(--muted); letter-spacing:.3px;}
  .sec-sum{font-size:12px; color:var(--muted);}
  .sec-sum b{color:var(--txt); font-size:16px;}

  .grid{display:grid; grid-template-columns:repeat(5,1fr); gap:6px;}

  /* 아이콘 위주 마크 타일 */
  .mark{
    position:relative; display:flex; align-items:center; gap:5px;
    background:#0b1f1a; border:1px solid var(--line);
    border-radius:11px; padding:5px 7px; cursor:pointer; user-select:none;
    color:var(--txt); min-width:0; line-height:1;
  }
  .mark:active{transform:scale(.94);}
  .badge{
    width:32px; height:32px; border-radius:50%; flex:none;
    display:flex; align-items:center; justify-content:center;
    font-size:18px; color:#fff; font-weight:700;
    box-shadow:inset 0 0 0 2px rgba(255,255,255,.18), 0 1px 2px rgba(0,0,0,.4);
  }
  .badge.code{font-size:12px; letter-spacing:-.5px;}
  .mcount{
    flex:1; text-align:right; font-size:24px; font-weight:800; padding-right:2px;
    font-variant-numeric:tabular-nums; transition:transform .12s;
  }
  .p1 .mcount{color:var(--p1);} .p2 .mcount{color:var(--p2);}
  .mark.bump .mcount{transform:scale(1.5);}
  .mark.zero .mcount{color:var(--muted); opacity:.4;}
  .mark .minus{
    position:absolute; top:-7px; right:-7px; width:22px; height:22px;
    border-radius:50%; background:var(--minus); color:#fff; border:2px solid var(--bg);
    font-size:14px; line-height:1; display:none; align-items:center; justify-content:center; cursor:pointer;
  }
  .mark:hover .minus{display:flex;}

  /* 편집 모드 */
  body.edit .grid{grid-template-columns:repeat(3,1fr);}
  body.edit .mark{cursor:default; gap:4px;}
  body.edit .mark:active{transform:none;}
  body.edit .mark .minus{display:none;}
  .icon-edit{width:38px; flex:none; font-size:14px; text-align:center; padding:3px 2px;
    border-radius:6px; outline:none; border:1px solid var(--muted); background:rgba(0,0,0,.25); color:var(--txt);}
  .ilabel-edit{flex:1; min-width:0; font-size:13px; padding:3px 5px; border-radius:6px;
    outline:none; border:1px solid var(--muted); background:rgba(0,0,0,.25); color:var(--txt);}
  .del{background:transparent; border:none; color:var(--minus); font-size:15px; cursor:pointer; flex:none;}
  .add{
    grid-column:1/-1; background:transparent; color:var(--muted);
    border:1px dashed var(--line); border-radius:8px; padding:6px; cursor:pointer; font-size:12px;
  }
  .add:hover{background:rgba(255,255,255,.04); color:var(--txt);}

  .hint{text-align:center; color:var(--muted); font-size:11px; padding:3px; flex:none; line-height:1.2;}
</style>
</head>
<body>
<header>
  <h1>🦁 아크노바 점수판 · 1:1 · ver. 가로모드</h1>
  <div class="tools">
    <button id="editBtn" onclick="toggleEdit()">✎ 편집</button>
    <button onclick="resetAll()">전체 초기화</button>
  </div>
</header>

<div class="board" id="board"></div>
<div class="hint" id="hint">아이콘을 터치하면 +1 · 편집 모드에서 아이콘·이름 수정 가능</div>

<script>
const KEY = "arknova_scoreboard_v3";
const OLD_KEY = "arknova_scoreboard_v2";
const DEFAULTS_VERSION = 2;   // 아이콘 기본값이 바뀔 때마다 +1 (점수는 유지, 아이콘만 갱신)
let editMode = false;

function defaultPlayer(name){
  return { name, sections:[
    { title:"🌍 대륙 마크", items:[
      {icon:"AF", code:true, label:"아프리카",   color:"#e0922e", count:0},
      {icon:"EU", code:true, label:"유럽",       color:"#4a78c9", count:0},
      {icon:"AS", code:true, label:"아시아",     color:"#c0463f", count:0},
      {icon:"OC", code:true, label:"오세아니아", color:"#2fa39a", count:0},
      {icon:"AM", code:true, label:"아메리카",   color:"#7b5cd6", count:0},
    ]},
    { title:"🐾 동물 종류 마크", items:[
      {icon:"🐦", label:"조류",     color:"#4aa3d9", count:0},
      {icon:"🦎", label:"파충류",   color:"#4f9e57", count:0},
      {icon:"🐸", label:"양서류",   color:"#7bb33a", count:0},
      {icon:"🐟", label:"어류",     color:"#3f9ec0", count:0},
      {icon:"🐙", label:"무척추동물", color:"#c77fd0", count:0},
      {icon:"🐻", label:"곰",       color:"#9c6b3f", count:0},
      {icon:"🐵", label:"영장류",   color:"#d99a3a", count:0},
      {icon:"🦁", label:"맹수",     color:"#d96f3a", count:0},
      {icon:"🦌", label:"초식동물", color:"#b08a55", count:0},
    ]},
    { title:"🔬 기타 특수 마크 & 지형", items:[
      {icon:"🔬", label:"과학",     color:"#5fae8f", count:0},
      {icon:"💧", label:"물 지형",  color:"#3f8fd0", count:0},
      {icon:"🪨", label:"바위 지형", color:"#8a8f97", count:0},
    ]},
  ]};
}

function loadKey(k){ try{ return JSON.parse(localStorage.getItem(k)); }catch(e){ return null; } }
function save(){ state._dv = DEFAULTS_VERSION; localStorage.setItem(KEY, JSON.stringify(state)); }

// 저장된 데이터에서 점수·이름·추가항목만 가져오고, 아이콘/색은 항상 최신 기본값을 사용
function init(){
  const cur = loadKey(KEY);
  // 아이콘 기본값 버전이 동일하면 저장본 그대로 사용
  if(cur && cur.players && cur._dv === DEFAULTS_VERSION) return cur;
  const fresh = { _dv:DEFAULTS_VERSION, players:[ defaultPlayer("플레이어 1"), defaultPlayer("플레이어 2") ] };
  const src = (cur && cur.players) ? cur : loadKey(OLD_KEY);
  if(src && src.players){
    fresh.players.forEach((p,pi)=>{
      const op = src.players[pi]; if(!op) return;
      if(op.name) p.name = op.name;
      p.sections.forEach((sec,si)=>{
        const os = op.sections && op.sections[si]; if(!os) return;
        // 기본 항목: 점수만 보존 (아이콘/색/이름은 새 기본값)
        sec.items.forEach((it,ii)=>{
          const oi = os.items && os.items[ii];
          if(oi && typeof oi.count === "number") it.count = oi.count;
        });
        // 사용자가 직접 추가했던 항목(기본 개수 초과분)은 그대로 유지
        if(os.items && os.items.length > sec.items.length){
          for(let k=sec.items.length; k<os.items.length; k++) sec.items.push(os.items[k]);
        }
      });
    });
  }
  return fresh;
}

let state = init();
save();   // 갱신된 기본값 버전을 즉시 저장해 다음 로드부터 안정

function render(){
  const board = document.getElementById("board");
  board.innerHTML = "";
  state.players.forEach((p, pi)=>{
    const col = document.createElement("div");
    col.className = "col " + (pi===0 ? "p1" : "p2");
    const fit = document.createElement("div");
    fit.className = "fit";

    const grand = p.sections.reduce((s,sec)=> s + sec.items.reduce((a,i)=>a+i.count,0), 0);

    const nameRow = document.createElement("div");
    nameRow.className = "name-row";
    nameRow.innerHTML = `<div class="accent"></div>
      <input class="pname" value="${escAttr(p.name)}">
      <div class="grand">총 마크<b>${grand}</b></div>`;
    fit.appendChild(nameRow);
    nameRow.querySelector(".pname").addEventListener("change", e=>{ state.players[pi].name = e.target.value; save(); });

    p.sections.forEach((sec, si)=>{
      const subtotal = sec.items.reduce((a,i)=>a+i.count,0);
      const secEl = document.createElement("div");
      secEl.className = "section";
      secEl.innerHTML = `<div class="sec-head">
          <span class="sec-title">${escHtml(sec.title)}</span>
          <span class="sec-sum">소계 <b>${subtotal}</b></span></div>`;

      const grid = document.createElement("div");
      grid.className = "grid";

      sec.items.forEach((it, ii)=>{
        const mark = document.createElement(editMode ? "div" : "button");
        mark.className = "mark" + (it.count===0 ? " zero" : "");
        mark.dataset.key = pi+"-"+si+"-"+ii;
        mark.title = it.label || "";

        if(editMode){
          const ic = document.createElement("input");
          ic.className = "icon-edit"; ic.value = it.icon; ic.maxLength = 4;
          ic.addEventListener("change", ()=>{
            const v = it.icon = ic.value.trim() || "?";
            it.code = /^[A-Za-z0-9]{1,4}$/.test(v); save();
          });
          const inp = document.createElement("input");
          inp.className = "ilabel-edit"; inp.value = it.label || "";
          inp.addEventListener("change", ()=>{ it.label = inp.value.trim() || "(이름)"; save(); });
          const del = document.createElement("button");
          del.className = "del"; del.textContent = "✕"; del.title = "삭제";
          del.onclick = ()=>{ sec.items.splice(ii,1); save(); render(); };
          mark.append(ic, inp, del);
        } else {
          const badge = document.createElement("span");
          badge.className = "badge" + (it.code ? " code" : "");
          badge.style.background = it.color || "#3a6b5e";
          badge.textContent = it.icon;
          const cnt = document.createElement("span"); cnt.className="mcount"; cnt.textContent = it.count;
          const minus = document.createElement("span"); minus.className="minus"; minus.textContent="−";
          minus.onclick = (e)=>{ e.stopPropagation(); changeCount(pi,si,ii,-1); };
          mark.append(badge, cnt, minus);
          mark.onclick = ()=> changeCount(pi,si,ii,1);
        }
        grid.appendChild(mark);
      });

      if(editMode){
        const addBtn = document.createElement("button");
        addBtn.className = "add"; addBtn.textContent = "＋ 항목 추가";
        addBtn.onclick = ()=>{ sec.items.push({icon:"⭐", label:"새 항목", color:"#3a6b5e", count:0}); save(); render(); };
        grid.appendChild(addBtn);
      }

      secEl.appendChild(grid);
      fit.appendChild(secEl);
    });

    col.appendChild(fit);
    board.appendChild(col);
  });
  fitColumns();
}

function fitColumns(){
  document.querySelectorAll(".col").forEach(col=>{
    const fit = col.querySelector(".fit");
    if(!fit) return;
    fit.style.transform = "none";
    fit.style.width = "100%";
    const avail = col.clientHeight;
    const natural = fit.scrollHeight;
    if(!natural) return;
    let s = (avail / natural) * 0.99;
    s = Math.max(0.2, Math.min(s, 4));
    fit.style.width = (100 / s) + "%";
    fit.style.transform = "scale(" + s + ")";
  });
}

function changeCount(pi,si,ii,delta){
  const it = state.players[pi].sections[si].items[ii];
  it.count = Math.max(0, it.count + delta);
  save();
  render();
  if(delta>0){
    const el = document.querySelector('.mark[data-key="'+pi+'-'+si+'-'+ii+'"]');
    if(el){ el.classList.add("bump"); setTimeout(()=>el.classList.remove("bump"), 130); }
  }
}

function toggleEdit(){
  editMode = !editMode;
  document.body.classList.toggle("edit", editMode);
  document.getElementById("editBtn").classList.toggle("on", editMode);
  document.getElementById("hint").textContent = editMode
    ? "편집: 왼쪽 칸=아이콘(이모지 또는 AF 같은 코드), 오른쪽 칸=이름 · ✕ 삭제 / ＋ 추가 · 끝나면 ✎ 다시 누르기"
    : "아이콘을 터치하면 +1 · 편집 모드에서 아이콘·이름 수정 가능";
  render();
}

function resetAll(){
  if(!confirm("두 플레이어의 모든 점수를 0으로 초기화할까요?\n(아이콘·이름은 유지됩니다)")) return;
  state.players.forEach(p=>p.sections.forEach(s=>s.items.forEach(i=>i.count=0)));
  save(); render();
}

function escHtml(s){ return (s+"").replace(/[&<>]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }
function escAttr(s){ return (s+"").replace(/"/g,"&quot;"); }

window.addEventListener("resize", fitColumns);
window.addEventListener("orientationchange", ()=> setTimeout(fitColumns, 300));
render();
</script>
</body>
</html>
