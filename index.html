<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>아크노바 점수판 (1:1)</title>
<meta name="theme-color" content="#0e2722">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="아크노바 점수판">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="icon-180.png">
<style>
  :root{
    --bg:#0e2722;
    --panel:#123a31;
    --panel2:#0f322a;
    --line:#1f5546;
    --txt:#eaf6f1;
    --muted:#9fc7ba;
    --p1:#e8842b;       /* 플레이어1 (주황) */
    --p2:#28c0c9;       /* 플레이어2 (청록) */
    --plus:#2f9e54;
    --minus:#c0463f;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%;}
  body{
    background:var(--bg); color:var(--txt);
    font-family:"Malgun Gothic","맑은 고딕","Apple SD Gothic Neo",sans-serif;
    display:flex; flex-direction:column; height:100vh; overflow:hidden;
  }

  header{
    display:flex; align-items:center; justify-content:center; gap:16px;
    padding:calc(6px + env(safe-area-inset-top)) 16px 6px; background:linear-gradient(#15463a,#0e2c25);
    border-bottom:2px solid var(--line); position:relative; flex:none;
  }
  header h1{font-size:20px; margin:0; letter-spacing:1px;}
  header .tools{position:absolute; right:14px; top:50%; transform:translateY(-50%); display:flex; gap:8px;}
  header button{
    background:#1c4f42; color:var(--txt); border:1px solid var(--line);
    padding:7px 13px; border-radius:8px; cursor:pointer; font-size:14px;
  }
  header button:hover{background:#256356;}
  header button.on{background:var(--p1); border-color:var(--p1); color:#1a1208; font-weight:700;}

  .board{flex:1; display:flex; min-height:0;}
  .col{
    flex:1 1 50%; padding:10px 14px 14px; display:flex; flex-direction:column;
    min-width:0; min-height:0; overflow:auto;
  }
  .col.p1{background:var(--panel); padding-left:calc(14px + env(safe-area-inset-left));}
  .col.p2{background:var(--panel2); border-left:3px solid var(--line); padding-right:calc(14px + env(safe-area-inset-right));}

  .name-row{display:flex; align-items:center; gap:12px; margin-bottom:8px; flex:none;}
  .accent{width:12px; height:40px; border-radius:4px; flex:none;}
  .p1 .accent{background:var(--p1);} .p2 .accent{background:var(--p2);}
  .pname{
    font-size:24px; font-weight:700; flex:1; background:transparent;
    border:none; border-bottom:2px dashed transparent; color:var(--txt);
    outline:none; padding:2px 4px; min-width:0;
  }
  .pname:focus{border-bottom-color:var(--muted);}
  .grand{font-size:13px; color:var(--muted); text-align:right; white-space:nowrap; line-height:1.1;}
  .grand b{font-size:34px; display:block; line-height:1;}
  .p1 .grand b{color:var(--p1);} .p2 .grand b{color:var(--p2);}

  .section{
    background:rgba(255,255,255,.03); border:1px solid var(--line);
    border-radius:12px; padding:8px 10px; margin-bottom:10px;
  }
  .sec-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:6px;}
  .sec-title{font-size:14px; font-weight:700; color:var(--muted); letter-spacing:.4px;}
  .sec-sum{font-size:13px; color:var(--muted);}
  .sec-sum b{color:var(--txt); font-size:17px;}

  .grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:7px;}

  /* 플레이 모드: 타일 전체가 +1 버튼 */
  .mark{
    position:relative; display:flex; align-items:center; gap:8px;
    background:rgba(0,0,0,.22); border:1px solid var(--line);
    border-radius:10px; padding:9px 12px; cursor:pointer; user-select:none;
    text-align:left; color:var(--txt); font-size:17px; min-width:0;
  }
  .mark:active{transform:scale(.96);}
  .mark .mlabel{flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .mark .mcount{
    font-size:26px; font-weight:800; min-width:30px; text-align:right;
    font-variant-numeric:tabular-nums; transition:transform .12s;
  }
  .p1 .mark .mcount{color:var(--p1);} .p2 .mark .mcount{color:var(--p2);}
  .mark.bump .mcount{transform:scale(1.45);}
  .mark .minus{
    position:absolute; top:-7px; right:-7px; width:24px; height:24px;
    border-radius:50%; background:var(--minus); color:#fff; border:2px solid var(--bg);
    font-size:16px; line-height:1; display:none; align-items:center; justify-content:center;
    cursor:pointer;
  }
  .mark:hover .minus{display:flex;}
  .mark.zero .mcount{color:var(--muted)!important; opacity:.45;}

  /* 편집 모드 */
  body.edit .mark{cursor:default;}
  body.edit .mark:active{transform:none;}
  body.edit .mark .minus{display:none;}
  .ilabel-edit{flex:1; min-width:0; font-size:16px; padding:3px 5px; border-radius:6px;
    outline:none; border:1px solid var(--muted); background:rgba(0,0,0,.25); color:var(--txt);}
  .del{background:transparent; border:none; color:var(--minus); font-size:17px; cursor:pointer; flex:none;}
  .add{
    grid-column:1/-1; background:transparent; color:var(--muted);
    border:1px dashed var(--line); border-radius:8px; padding:7px; cursor:pointer; font-size:13px;
  }
  .add:hover{background:rgba(255,255,255,.04); color:var(--txt);}

  .hint{text-align:center; color:var(--muted); font-size:12px; padding:4px; flex:none;}
</style>
</head>
<body>
<header>
  <h1>🦁 아크노바 점수판 · 1:1</h1>
  <div class="tools">
    <button id="editBtn" onclick="toggleEdit()">✎ 편집</button>
    <button onclick="resetAll()">전체 초기화</button>
  </div>
</header>

<div class="board" id="board"></div>
<div class="hint" id="hint">마크를 터치하면 +1 · 우측 상단 ✎ 편집에서 이름 수정·추가·삭제</div>

<script>
const STORAGE_KEY = "arknova_scoreboard_v2";
let editMode = false;

function defaultPlayer(name){
  return { name, sections:[
    { title:"🌍 대륙 마크", items:[
      {label:"🌍 아프리카",count:0},{label:"🌐 유럽",count:0},{label:"🌏 아시아",count:0},
      {label:"🦘 오세아니아",count:0},{label:"🌎 아메리카",count:0},
    ]},
    { title:"🐾 동물 종류 마크", items:[
      {label:"🐦 조류",count:0},{label:"🦎 파충류",count:0},{label:"🐸 양서류",count:0},
      {label:"🐟 어류",count:0},{label:"🦋 무척추동물",count:0},{label:"🐻 곰",count:0},
      {label:"🐵 영장류",count:0},{label:"🦁 맹수",count:0},{label:"🦌 초식동물",count:0},
    ]},
    { title:"🔬 기타 특수 마크 & 지형", items:[
      {label:"🔬 과학",count:0},{label:"💧 물 지형",count:0},{label:"🪨 바위 지형",count:0},
    ]},
  ]};
}

let state = load() || { players:[ defaultPlayer("플레이어 1"), defaultPlayer("플레이어 2") ] };

function load(){ try{ return JSON.parse(localStorage.getItem(STORAGE_KEY)); }catch(e){ return null; } }
function save(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

function render(){
  const board = document.getElementById("board");
  board.innerHTML = "";
  state.players.forEach((p, pi)=>{
    const col = document.createElement("div");
    col.className = "col " + (pi===0 ? "p1" : "p2");

    const grand = p.sections.reduce((s,sec)=> s + sec.items.reduce((a,i)=>a+i.count,0), 0);

    const nameRow = document.createElement("div");
    nameRow.className = "name-row";
    nameRow.innerHTML = `<div class="accent"></div>
      <input class="pname" value="${escAttr(p.name)}">
      <div class="grand">총 마크<b>${grand}</b></div>`;
    col.appendChild(nameRow);
    nameRow.querySelector(".pname").addEventListener("change", e=>{ state.players[pi].name = e.target.value; save(); });

    p.sections.forEach((sec, si)=>{
      const subtotal = sec.items.reduce((a,i)=>a+i.count,0);
      const secEl = document.createElement("div");
      secEl.className = "section";
      secEl.innerHTML = `<div class="sec-head">
          <span class="sec-title">${escHtml(sec.title)}</span>
          <span class="sec-sum">소계 <b>${subtotal}</b></span></div>`;

      const grid = document.createElement("div");
      grid.className = "grid";

      sec.items.forEach((it, ii)=>{
        const mark = document.createElement(editMode ? "div" : "button");
        mark.className = "mark" + (it.count===0 ? " zero" : "");
        mark.dataset.key = pi+"-"+si+"-"+ii;

        if(editMode){
          const inp = document.createElement("input");
          inp.className = "ilabel-edit"; inp.value = it.label;
          inp.addEventListener("change", ()=>{ state.players[pi].sections[si].items[ii].label = inp.value.trim()||"(이름)"; save(); });
          const del = document.createElement("button");
          del.className = "del"; del.textContent = "✕"; del.title = "삭제";
          del.onclick = ()=>{ state.players[pi].sections[si].items.splice(ii,1); save(); render(); };
          mark.append(inp, del);
        } else {
          const lab = document.createElement("span"); lab.className="mlabel"; lab.textContent = it.label;
          const cnt = document.createElement("span"); cnt.className="mcount"; cnt.textContent = it.count;
          const minus = document.createElement("span"); minus.className="minus"; minus.textContent="−";
          minus.onclick = (e)=>{ e.stopPropagation(); changeCount(pi,si,ii,-1,mark); };
          mark.append(lab, cnt, minus);
          mark.onclick = ()=> changeCount(pi,si,ii,1,mark);
        }
        grid.appendChild(mark);
      });

      if(editMode){
        const addBtn = document.createElement("button");
        addBtn.className = "add"; addBtn.textContent = "＋ 항목 추가";
        addBtn.onclick = ()=>{ state.players[pi].sections[si].items.push({label:"새 항목",count:0}); save(); render(); };
        grid.appendChild(addBtn);
      }

      secEl.appendChild(grid);
      col.appendChild(secEl);
    });

    board.appendChild(col);
  });
}

function changeCount(pi,si,ii,delta,markEl){
  const it = state.players[pi].sections[si].items[ii];
  it.count = Math.max(0, it.count + delta);
  save();
  render();
  // 방금 누른 마크만 잠깐 반짝이게 (render로 노드가 새로 생기므로 다시 찾아 적용)
  if(delta>0){
    const el = document.querySelector('.mark[data-key="'+pi+'-'+si+'-'+ii+'"]');
    if(el){ el.classList.add("bump"); setTimeout(()=>el.classList.remove("bump"), 130); }
  }
}

function toggleEdit(){
  editMode = !editMode;
  document.body.classList.toggle("edit", editMode);
  document.getElementById("editBtn").classList.toggle("on", editMode);
  document.getElementById("hint").textContent = editMode
    ? "편집 모드: 이름을 수정하고 ✕ 삭제 / ＋ 항목 추가 · 끝나면 ✎ 편집을 다시 눌러 종료"
    : "마크를 터치하면 +1 · 우측 상단 ✎ 편집에서 이름 수정·추가·삭제";
  render();
}

function resetAll(){
  if(!confirm("두 플레이어의 모든 점수를 0으로 초기화할까요?\n(항목 이름은 유지됩니다)")) return;
  state.players.forEach(p=>p.sections.forEach(s=>s.items.forEach(i=>i.count=0)));
  save(); render();
}

function escHtml(s){ return (s+"").replace(/[&<>]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }
function escAttr(s){ return (s+"").replace(/"/g,"&quot;"); }

render();
</script>
</body>
</html>
